name: Release

# Fires on Unraid-style version tags: YYYY.MM.DD[.N], e.g. 2026.05.31.1.
on:
  push:
    tags:
      - '2[0-9][0-9][0-9].[0-9][0-9].[0-9][0-9]*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source (full history so we can push back)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build deterministic tarball
        run: bash scripts/build.sh "${GITHUB_REF_NAME}"

      - name: Inject the tarball SHA256 into UManagerCompanion.plg
        id: sha
        run: |
          TARBALL="dist/companion-${GITHUB_REF_NAME}.tar.gz"
          SHA=$(sha256sum "$TARBALL" | cut -d' ' -f1)
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          sed -i -E "s|<SHA256>[^<]+</SHA256>|<SHA256>${SHA}</SHA256>|" UManagerCompanion.plg
          echo "Tarball: $TARBALL"
          echo "SHA256:  $SHA"
          grep -E '<SHA256>' UManagerCompanion.plg

      - name: Commit the updated .plg back to main
        # Existing installations check the .plg at raw.githubusercontent.com/.../main,
        # so the SHA in that file must match every published tarball. Doing it from
        # CI keeps the source repo SHA-clean (placeholder) and removes the manual
        # bump-and-tag-twice dance. The push targets main directly and does not
        # retrigger this workflow because it only listens on tag pushes.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "Jandro"
          git config user.email "alejandroplatasmallo@gmail.com"
          if git diff --quiet -- UManagerCompanion.plg; then
            echo "No SHA change to commit (already up to date)"
            exit 0
          fi
          git add UManagerCompanion.plg
          git commit -m "release: ${GITHUB_REF_NAME} (.plg SHA from CI)"
          git push origin HEAD:main

      - name: Publish GitHub release with the tarball
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: dist/companion-${{ github.ref_name }}.tar.gz
          generate_release_notes: false
          fail_on_unmatched_files: true
