name: Build and publish companion tarball

# Fires when a version-shaped tag is pushed. Tag format follows the
# Unraid plugin convention: YYYY.MM.DD[.N] — e.g. `2026.05.29.2`.
on:
  push:
    tags:
      - '2[0-9][0-9][0-9].[0-9][0-9].[0-9][0-9]*'

permissions:
  contents: write   # required to create a release and upload the asset

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build deterministic tarball
        run: bash scripts/build.sh "${GITHUB_REF_NAME}"

      - name: Verify .plg SHA256 matches the freshly-built tarball
        run: |
          TARBALL_SHA=$(sha256sum "dist/companion-${GITHUB_REF_NAME}.tar.gz" | cut -d' ' -f1)
          PLG_SHA=$(grep -oE '<SHA256>[a-f0-9]{64}</SHA256>' UManagerCompanion.plg \
                    | head -1 | sed -E 's|</?SHA256>||g')
          echo "Tarball SHA256: $TARBALL_SHA"
          echo ".plg SHA256:    $PLG_SHA"
          if [ "$TARBALL_SHA" != "$PLG_SHA" ]; then
            echo "::error::SHA mismatch — bump scripts/build.sh locally, update UManagerCompanion.plg, re-tag."
            exit 1
          fi

      - name: Publish GitHub release with the tarball
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: dist/companion-${{ github.ref_name }}.tar.gz
          generate_release_notes: false
          fail_on_unmatched_files: true
