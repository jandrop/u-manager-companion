# u-manager-companion service schema -- v1 (SCHEMA_VERSION in version.ts).
#
# This SDL is the migration contract: every field, argument, type and
# nullability choice here mirrors exactly what the app's companion op
# catalogue selects under
# packages/unraid_api/lib/src/graphql/companion/**/*.dart in the u_manager
# repo, so existing DTOs deserialize unchanged. Field/type names below are
# cross-referenced against:
#   - mutations/unraid_graphql_docker_template_mutations.dart
#   - mutations/unraid_graphql_docker_mutations.dart
#   - mutations/unraid_graphql_server_power_mutations.dart
#   - mutations/unraid_graphql_plugins_mutations.dart
#   - queries/unraid_graphql_docker_template_queries.dart (dockerInstallOperationQuery, dockerTemplateQuery)
#   - subscriptions/unraid_graphql_docker_template_subscriptions.dart
#   - unraid_domain/lib/src/entities/docker_install_operation.dart (DockerInstallStatus enum)
#
# Schema-only scope here (SDL + version/capabilities); resolver wiring
# binding these fields to server.ts and the feature modules lives
# separately -- only the capabilities resolver (health.ts) exists at this
# stage.
#
# Slice 1 (shares) additionally cross-references, for field/type/arg
# parity:
#   - queries/unraid_graphql_shares_queries.dart (sharesQuery, shareSecurityQuery,
#     shareSecurityUsersQuery, shareIsEmptyQuery)
#   - mutations/unraid_graphql_shares_mutations.dart (createShareMutation,
#     updateShareMutation, deleteShareMutation, updateShareSecurityMutation,
#     updateShareAccessMutation)
# `shares`/`shareSecurity`/`shareSecurityUsers`/`shareIsEmpty`/the share
# mutations sit at the ROOT Query/Mutation (not namespaced under a
# `*Mutations` type) -- mirrors the app op catalogue, which selects these
# fields directly off `query`/`mutation`, not through a namespace object.
#
# Slice 2 (plugins) additionally cross-references, for field/type parity:
#   - queries/unraid_graphql_plugins_queries.dart (installedUnraidPluginsDetailedQuery)
# `installedUnraidPluginsDetailed` also sits at the ROOT Query, same
# un-namespaced convention as shares.

"Upstream unraid-api's prefixed-ID scalar (e.g. \"docker:<hash>\"). updateContainerStream($id: PrefixedID!) selects this exact scalar name -- kept as a distinct scalar rather than aliasing to ID so an accidental bare-ID argument mismatch fails catalogue parity instead of silently type-checking."
scalar PrefixedID

"Untyped JSON scalar, used by the `settings`/`access` mutation arguments and the `shareSecurity`/`shareSecurityUsers` query return types -- the client deserialises the raw JSON payload itself, matching sharesQuery's companion op shapes exactly."
scalar JSON

"64-bit integer scalar for byte-sized fields. Mirrors upstream unraid-api's `Share.free/used/size: BigInt` -- real share sizes exceed GraphQL's 32-bit `Int` range. Identity passthrough (like `JSON`/`PrefixedID`): the resolver returns a JS number and the client's DTO reads it as a 64-bit int."
scalar BigInt

type Query {
  "Snapshot fetch for a tracked docker install/edit/update operation. Returns null once the operation TTL (15 min post-completion) has expired."
  dockerInstallOperation(operationId: ID!): DockerInstallOperation

  "Returns the saved user template for an existing Docker container (read from templates-user/my-<name>.xml on the server). Returns null when no template is on disk for the given name. Hydrates the Edit screen's form."
  dockerTemplate(name: String!): DockerTemplate

  "Service self-description: schema version + serviceVersion + served capability keys. Primary signal for CompanionStatusCubit detection."
  capabilities: CompanionCapabilities!

  "List of user shares, including the useCache/cachePool/cachePool2 extra fields. Mirrors sharesQuery (companion) in unraid_graphql_shares_queries.dart exactly."
  shares: [Share!]!

  "Current SMB security state for a user share (export/security/caseSensitive/readList/writeList/volsizelimit), read from sec.ini. Returned as a raw JSON scalar -- the client deserialises it, matching shareSecurityQuery."
  shareSecurity(name: String!): JSON

  "List of Unraid users available for share access control ({id, name, description, isRoot}), read from users.ini. Returned as a raw JSON scalar, matching shareSecurityUsersQuery."
  shareSecurityUsers: JSON

  "True when /mnt/user/<name> contains no user-visible files. Used by the share editor to gate the Delete button (emhttpd refuses to remove a non-empty share). Mirrors shareIsEmptyQuery."
  shareIsEmpty(name: String!): Boolean!

  "Installed Unraid OS plugins enriched with parsed .plg manifest metadata (name, author, version, description, changelog, cached update info). Mirrors installedUnraidPluginsDetailedQuery in unraid_graphql_plugins_queries.dart exactly."
  installedUnraidPluginsDetailed: [InstalledPluginManifest!]!
}

type Mutation {
  docker: DockerMutations!
  serverPower: ServerPowerMutations!
  unraidPlugins: UnraidPluginsMutations!

  "Creates a new user share. `settings` carries optional keys (comment, cachePool, cachePool2, useCache, cow, floor, allocator, splitLevel, include[], exclude[]) -- omitted keys fall back to emhttpd's defaults. Mirrors createShareMutation."
  createShare(name: String!, settings: JSON): Share

  "Updates an existing user share. Omitted keys in `settings` keep their current value (server-side merge). Mirrors updateShareMutation."
  updateShare(name: String!, settings: JSON): Share

  "Deletes a user share by name. The share directory must be empty. Mirrors deleteShareMutation."
  deleteShare(name: String!): Boolean!

  "Updates a share's SMB general security settings (export, security mode, case-sensitive, Time Machine size). Mirrors updateShareSecurityMutation."
  updateShareSecurity(name: String!, settings: JSON): Boolean!

  "Updates per-user share access. `access` is a list of {userId, access} entries (access: read-write/read-only/no-access). Mirrors updateShareAccessMutation."
  updateShareAccess(name: String!, access: JSON!): Boolean!
}

type Subscription {
  "Per-line/status-transition delta feed for a docker install, edit, or update operation. Same channel is fed by installDockerTemplate, updateDockerTemplate, updateContainerStream and updateAllContainersStream."
  dockerInstallUpdates(operationId: ID!): DockerInstallEvent!
}

# ---------------------------------------------------------------------------
# Mutation namespaces
# ---------------------------------------------------------------------------

type DockerMutations {
  "Starts an async Docker template install (CA Store flow). Returns the operation snapshot immediately; subscribe to dockerInstallUpdates(operationId) for progress."
  installDockerTemplate(input: DockerTemplateInput!): DockerInstallOperation!

  "Starts an async Docker template edit: stop+remove existing container, rewrite my-<Name>.xml, re-pull image, recreate via rebuild_container. input.name must match the existing container name."
  updateDockerTemplate(input: DockerTemplateInput!): DockerInstallOperation!

  "Uninstalls a CA-installed Docker container (stop+remove; optionally remove image + prune volumes). Synchronous -- returns true on success."
  deleteDockerTemplate(
    name: String!
    removeContainer: Boolean
    removeImage: Boolean
  ): Boolean!

  "Streaming single-container update. Returns the operation immediately (status=RUNNING); subscribe to dockerInstallUpdates(operationId)."
  updateContainerStream(id: PrefixedID!): DockerInstallOperation!

  "Streaming update-all: finds every container with an available update and runs the per-container pipeline under one operation."
  updateAllContainersStream: DockerInstallOperation!

  "Synchronous refresh of the update-status cache (re-pulls each template, queries remote registry digests). Returns true on success."
  checkForUpdates: Boolean!
}

type ServerPowerMutations {
  "Cleanly stops the array and powers the server off. Fire-and-forget -- audited BEFORE the detached call fires."
  shutdown: Boolean!

  "Cleanly stops the array and reboots the server. Fire-and-forget, audited BEFORE the detached call fires."
  reboot: Boolean!

  "Puts the server into S3 sleep. Guarded on the Dynamix S3 Sleep plugin script's existence. Fire-and-forget, audited BEFORE the detached call fires."
  sleep: Boolean!
}

type UnraidPluginsMutations {
  "Uninstalls an Unraid plugin by .plg filename. Returns a PluginInstallOperation (same shape/channel model as DockerInstallOperation) so pluginInstallUpdates-equivalent progress can be tracked. Audited."
  uninstallPlugin(filename: String!): PluginInstallOperation!

  "Triggers a background plugin update check (plugin checkall semantics). Returns true once the check is kicked off -- the boolean does not indicate check outcome. NOT audited (non-privileged read)."
  checkForUpdates: Boolean!
}

# ---------------------------------------------------------------------------
# Operation snapshot / event types
# ---------------------------------------------------------------------------

"Lifecycle status shared by docker install/edit/update operations. Mirrors unraid_domain's DockerInstallStatus enum (QUEUED/RUNNING/SUCCEEDED/FAILED wire strings)."
enum DockerInstallStatus {
  QUEUED
  RUNNING
  SUCCEEDED
  FAILED
}

"Tracked docker template install/edit/update operation snapshot. Returned immediately by the triggering mutation and by the dockerInstallOperation(id) snapshot query."
type DockerInstallOperation {
  id: ID!
  containerName: String!
  repository: String!
  status: DockerInstallStatus!
  createdAt: String!
  updatedAt: String
  finishedAt: String
  "Cumulative output lines since the operation started, capped at the most recent 500 (ring buffer)."
  output: [String!]!
}

"Single delta event emitted by the dockerInstallUpdates subscription. output carries only the NEW lines since the previous event, not the cumulative buffer."
type DockerInstallEvent {
  operationId: ID!
  status: DockerInstallStatus!
  output: [String!]
  timestamp: String!
}

"Tracked plugin uninstall operation snapshot. Reuses the DockerInstallOperation shape/semantics (design: 'the resolver reuses the shape')."
type PluginInstallOperation {
  id: ID!
  url: String
  name: String!
  status: DockerInstallStatus!
  createdAt: String!
  updatedAt: String
  finishedAt: String
  output: [String!]!
}

# ---------------------------------------------------------------------------
# Docker template input shape
# ---------------------------------------------------------------------------

"Config entry kind. Wire values are upper-case; the app's data source maps them to/from XML-derived title-case (Path/Port/Variable/Label/Device)."
enum DockerConfigEntryType {
  PATH
  PORT
  VARIABLE
  LABEL
  DEVICE
}

input DockerTemplateConfigInput {
  name: String!
  type: DockerConfigEntryType!
  target: String!
  value: String!
  default: String!
  mode: String!
  description: String!
  display: String!
  required: Boolean!
  mask: Boolean!
}

"Config entry as read back from an on-disk template (dockerTemplate query). Field set matches DockerTemplateConfigInput's output-side mirror in unraid_graphql_docker_template_queries.dart's dockerTemplateQuery selection."
type DockerTemplateConfig {
  name: String!
  type: DockerConfigEntryType!
  target: String!
  value: String!
  default: String!
  mode: String!
  description: String!
  display: String!
  required: Boolean!
  mask: Boolean!
}

"Saved user template for an existing Docker container, as read back by the dockerTemplate(name) query. Field set mirrors dockerTemplateQuery's selection in unraid_graphql_docker_template_queries.dart exactly."
type DockerTemplate {
  name: String!
  repository: String!
  network: String!
  privileged: Boolean!
  shell: String!
  overview: String
  icon: String
  webui: String
  support: String
  project: String
  readme: String
  registry: String
  extraParams: String
  postArgs: String
  cpuset: String
  fixedMac: String
  configs: [DockerTemplateConfig!]!
}

"Install/edit payload -- shape matches DockerTemplateRemoteEntity's _templateToGraphqlInput mapping in the app's docker_template_data_source.dart exactly (field-for-field, including nullability)."
input DockerTemplateInput {
  name: String!
  repository: String!
  network: String!
  privileged: Boolean!
  shell: String!
  overview: String
  icon: String
  webui: String
  support: String
  project: String
  readme: String
  registry: String
  extraParams: String
  postArgs: String
  cpuset: String
  fixedMac: String
  configs: [DockerTemplateConfigInput!]!
}

# ---------------------------------------------------------------------------
# Shares (Slice 1 -- companion-category-a-migration)
# ---------------------------------------------------------------------------

"User share, as read from shares.ini. Field set mirrors sharesQuery's selection in unraid_graphql_shares_queries.dart exactly, including the useCache/cachePool/cachePool2 extra fields the share editor needs to pre-populate its dropdowns (the stock unraid-api Share type ships only a derived `cache: Boolean`, not these three raw .cfg-backed values). Numeric fields (free/used/size) are int-valued, and include/exclude are each a single delimited string rather than a list."
type Share {
  id: ID!
  name: String!
  free: BigInt
  used: BigInt
  size: BigInt
  include: String
  exclude: String
  cache: Boolean
  "Raw cache usage mode written to the share .cfg (\"\", \"no\", \"yes\", \"prefer\", \"only\")."
  useCache: String
  "Primary storage pool name (e.g. \"cache\"). Empty when the share lives on the array."
  cachePool: String
  "Secondary storage pool name. Empty when no secondary pool is configured."
  cachePool2: String
  nameOrig: String
  comment: String
  allocator: String
  splitLevel: String
  floor: String
  cow: String
  color: String
  luksStatus: Int
}

# ---------------------------------------------------------------------------
# Plugins (Slice 2 -- companion-category-a-migration)
# ---------------------------------------------------------------------------

"Parsed manifest of an installed Unraid plugin (.plg file), read from /boot/config/plugins/. Field set mirrors installedUnraidPluginsDetailedQuery's selection in unraid_graphql_plugins_queries.dart exactly."
type InstalledPluginManifest {
  "Bare .plg filename in /boot/config/plugins."
  filename: String!
  "Plugin name slug from <!ENTITY name>. Falls back to the filename without .plg."
  name: String!
  "Plugin author from <!ENTITY author> (or the <PLUGIN author> attribute when the entity isn't declared)."
  author: String
  "Plugin version string from <!ENTITY version>."
  version: String
  "Free-text description read from the plugin's extracted README.md, not from the .plg manifest."
  description: String
  "Remote .plg URL from <!ENTITY pluginURL>."
  pluginURL: String
  "Support thread URL from <!ENTITY support> (or supportURL)."
  support: String
  "Icon path or URL from <!ENTITY icon>."
  icon: String
  "Launch path from <!ENTITY launch>."
  launch: String
  "Raw <CHANGES> body from the local .plg."
  changelog: String
  "Version from the cached remote .plg at /tmp/plugins/<filename>, if Unraid has run an update check."
  latestVersion: String
  "Timestamp of the cached remote .plg at /tmp/plugins/<filename> -- when Unraid last fetched it via plugin checkall. ISO 8601 string."
  lastCheckedAt: String
}

# ---------------------------------------------------------------------------
# Capabilities / versioning
# ---------------------------------------------------------------------------

type CompanionCapabilities {
  "Bumps only on breaking SDL changes; additive fields never bump it."
  schemaVersion: String!
  "Service package version (semver), independent of schemaVersion."
  serviceVersion: String!
  "Capability keys this running service serves -- see schema/version.ts CAPABILITY_KEYS. The app gates per-capability routing on membership in this list."
  features: [String!]!
}
